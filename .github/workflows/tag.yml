name: Auto Tag

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create tag from TOC version
        run: |
          ver=$(grep -oP '## Version:\s*\K\S+' ElvUI_TrenchyUI.toc)
          if git rev-parse "v$ver" >/dev/null 2>&1; then
            echo "Tag v$ver already exists, skipping."
          else
            git tag "v$ver"
            git push origin "v$ver"
            echo "Created and pushed tag v$ver"
          fi
